<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ming-Omni-TTS WebUI</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Ming-Omni-TTS 语音合成</h1>
            <button class="settings-btn" onclick="openSettings()" title="设置">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('instruct_tts')">Instruct TTS</button>
            <button class="tab" onclick="switchTab('zero_shot_tts')">Zero-shot TTS</button>
            <button class="tab" onclick="switchTab('podcast')">Podcast</button>
            <button class="tab" onclick="switchTab('speech_with_bgm')">Speech with BGM</button>
            <button class="tab" onclick="switchTab('bgm')">BGM Generation</button>
            <button class="tab" onclick="switchTab('tta')">Sound Effects (TTA)</button>
        </div>

        <!-- Instruct TTS -->
        <div id="instruct_tts" class="tab-content active">
            <div class="row">
                <div class="col">
                    <div class="form-group" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                        <label style="min-width: 50px;">配置：</label>
                        <div class="search-select-container" style="position: relative; flex: 1; min-width: 200px;">
                            <input type="text" id="instruct_config_search" placeholder="搜索已保存的配置..." autocomplete="off" style="margin-bottom: 5px;">
                            <div id="instruct_config_dropdown" class="search-dropdown" style="display: none;"></div>
                        </div>
                        <input type="hidden" id="instruct_config_select">
                        <button onclick="loadInstructConfig()" class="secondary" style="padding: 8px 16px; cursor: pointer;">加载</button>
                        <button onclick="showSaveInstructConfigModal()" class="secondary" style="padding: 8px 16px; cursor: pointer;">保存当前</button>
                    </div>
                    <div id="instruct_config_msg" style="font-size: 12px; color: #666; margin-top: 5px;"></div>
                    <div class="form-group">
                        <label>指令类型：</label>
                        <select id="instruct_type" onchange="updateInstructVisibility()">
                            <option value="emotion">Emotion (情感)</option>
                            <option value="dialect">Dialect (方言)</option>
                            <option value="ip">IP (人物)</option>
                            <option value="style">Style (风格)</option>
                            <option value="basic">Basic (基础)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>输入文本：</label>
                        <textarea id="instruct_text" rows="4" placeholder="请输入要合成语音的文本..."></textarea>
                    </div>
                    <div class="form-group" id="instruct_prompt_group">
                        <label>参考音频 (可选，用于音色克隆)：</label>
                        <div class="drop-zone" id="instruct_drop_zone">
                            <input type="file" id="instruct_prompt_audio" accept="audio/*">
                            <p>拖拽音频文件到此处 或 点击选择</p>
                        </div>
                        <div id="instruct_prompt_audio_display"></div>
                        <input type="hidden" id="instruct_config_audio_path">
                    </div>
                    
                    <!-- Emotion Controls -->
                    <div class="form-group instruct-detail" id="emotion_controls">
                        <label>情感：</label>
                        <select id="instruct_emotion">
                            <option value="高兴">高兴</option>
                            <option value="悲伤">悲伤</option>
                            <option value="愤怒">愤怒</option>
                        </select>
                    </div>
                    
                    <!-- Dialect Controls -->
                    <div class="form-group instruct-detail" id="dialect_controls" style="display:none;">
                        <label>方言：</label>
                        <select id="instruct_dialect">
                            <option value="四川话">四川话</option>
                            <option value="广粤话">广粤话</option>
                        </select>
                    </div>
                    
                    <!-- IP Controls -->
                    <div class="form-group instruct-detail" id="ip_controls" style="display:none;">
                        <label>人物选择 (IP)：</label>
                        <div class="search-select-container" style="position: relative;">
                            <input type="text" id="ip_search" placeholder="搜索内置人物..." autocomplete="off" style="margin-bottom: 5px;">
                            <div id="ip_dropdown" class="search-dropdown" style="display: none;"></div>
                        </div>
                        <input type="hidden" id="instruct_ip">
                    </div>
                    
                    <!-- Style Controls -->
                    <div class="form-group instruct-detail" id="style_controls" style="display:none;">
                        <label>风格描述：</label>
                        <textarea id="instruct_style" rows="2" placeholder="例如: Speak with a loud and powerful volume, showing male toughness and majesty."></textarea>
                    </div>
                    
                    <!-- Basic Controls -->
                    <div class="form-group instruct-detail" id="basic_controls" style="display:none;">
                        <label>语速：</label>
                        <select id="instruct_speed">
                            <option value="慢速">慢速</option>
                            <option value="中速" selected>中速</option>
                            <option value="快速">快速</option>
                        </select>
                        <label>音高：</label>
                        <select id="instruct_pitch">
                            <option value="低">低</option>
                            <option value="中" selected>中</option>
                            <option value="高">高</option>
                        </select>
                        <label>音量：</label>
                        <select id="instruct_volume">
                            <option value="低">低</option>
                            <option value="中" selected>中</option>
                            <option value="高">高</option>
                        </select>
                    </div>
                    
                    <button id="instruct_generate" onclick="generateInstructTTS()" class="generate-btn">生成语音</button>
                    <div id="instruct_result"></div>
                </div>
            </div>
        </div>

        <!-- Zero-shot TTS -->
        <div id="zero_shot_tts" class="tab-content">
            <div class="row">
                <div class="col">
                    <div class="form-group" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                        <label style="min-width: 50px;">配置：</label>
                        <div class="search-select-container" style="position: relative; flex: 1; min-width: 200px;">
                            <input type="text" id="zs_config_search" placeholder="搜索已保存的配置..." autocomplete="off" style="margin-bottom: 5px;">
                            <div id="zs_config_dropdown" class="search-dropdown" style="display: none;"></div>
                        </div>
                        <input type="hidden" id="zs_config_select">
                        <button onclick="loadZeroShotConfig()" class="secondary" style="padding: 8px 16px; cursor: pointer;">加载</button>
                        <button onclick="showSaveZeroShotConfigModal()" class="secondary" style="padding: 8px 16px; cursor: pointer;">保存当前</button>
                    </div>
                    <div id="zs_config_msg" style="font-size: 12px; color: #666; margin-top: 5px;"></div>
                    <div class="form-group">
                        <label>目标文本：</label>
                        <textarea id="zs_text" rows="4" placeholder="请输入要合成语音的文本..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>参考音频 (3-7秒最佳，用于音色克隆)：</label>
                        <div class="drop-zone" id="zs_drop_zone">
                            <input type="file" id="zs_prompt_audio" accept="audio/*">
                            <p>拖拽音频文件到此处 或 点击选择</p>
                        </div>
                        <div id="zs_prompt_audio_display"></div>
                        <input type="hidden" id="zs_config_audio_path">
                    </div>
                    <div class="form-group">
                        <label>内置人物 (可选)：</label>
                        <div class="search-select-container" style="position: relative;">
                            <input type="text" id="zs_ip_search" placeholder="搜索内置人物..." autocomplete="off" style="margin-bottom: 5px;">
                            <div id="zs_ip_dropdown" class="search-dropdown" style="display: none;"></div>
                        </div>
                        <input type="hidden" id="zs_instruct_ip">
                    </div>
                    <button id="zs_generate" onclick="generateZeroShotTTS()" class="generate-btn">克隆音色并生成语音</button>
                    <div id="zs_result"></div>
                </div>
            </div>
        </div>

        <!-- Podcast -->
        <div id="podcast" class="tab-content">
            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label>对话脚本：</label>
                        <textarea id="pod_text" rows="6" placeholder="使用 'speaker_1:' 和 'speaker_2:' 等来区分说话人。例如：
speaker_1: 你好！
speaker_2: 你好！"></textarea>
                    </div>
                    <div class="form-group">
                        <label>参考音频（按speaker_1, speaker_2, ...顺序）：</label>
                    </div>
                    <div class="form-group">
                        <label>Speaker 1 参考音频：</label>
                        <div class="drop-zone" id="pod_drop_zone1">
                            <input type="file" id="pod_prompt_audio1" accept="audio/*">
                            <p>拖拽音频文件到此处 或 点击选择</p>
                        </div>
                        <div id="pod_prompt_audio_display1"></div>
                    </div>
                    <div class="form-group">
                        <label>Speaker 2 参考音频：</label>
                        <div class="drop-zone" id="pod_drop_zone2">
                            <input type="file" id="pod_prompt_audio2" accept="audio/*">
                            <p>拖拽音频文件到此处 或 点击选择</p>
                        </div>
                        <div id="pod_prompt_audio_display2"></div>
                    </div>
                    <div class="form-group">
                        <label>Speaker 3 参考音频（可选）：</label>
                        <div class="drop-zone" id="pod_drop_zone3">
                            <input type="file" id="pod_prompt_audio3" accept="audio/*">
                            <p>拖拽音频文件到此处 或 点击选择</p>
                        </div>
                        <div id="pod_prompt_audio_display3"></div>
                    </div>
                    <button id="pod_generate" onclick="generatePodcast()" class="generate-btn">生成对话</button>
                    <div id="pod_result"></div>
                </div>
            </div>
        </div>

        <!-- Speech with BGM -->
        <div id="speech_with_bgm" class="tab-content">
            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label>语音文本：</label>
                        <textarea id="swb_text" rows="4" placeholder="请输入语音文本..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>说话人参考音频：</label>
                        <div class="drop-zone" id="swb_drop_zone">
                            <input type="file" id="swb_prompt_audio" accept="audio/*">
                            <p>拖拽音频文件到此处 或 点击选择</p>
                        </div>
                        <div id="swb_prompt_audio_display"></div>
                    </div>
                    <h4 class="section-title">BGM 描述</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label>风格：</label>
                            <select id="swb_genre">
                                <option value="流行摇滚">流行摇滚</option>
                                <option value="迪斯科">迪斯科</option>
                                <option value="电子舞曲">电子舞曲</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>情绪：</label>
                            <select id="swb_mood">
                                <option value="快乐">快乐</option>
                                <option value="兴奋">兴奋</option>
                                <option value="活力四射">活力四射</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>乐器：</label>
                            <select id="swb_instrument">
                                <option value="电吉他">电吉他</option>
                                <option value="合成铜管乐器">合成铜管乐器</option>
                                <option value="架子鼓">架子鼓</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>主题：</label>
                            <select id="swb_theme">
                                <option value="生日">生日</option>
                                <option value="旅行">旅行</option>
                                <option value="运动">运动</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>SNR (信噪比)：</label>
                        <div class="slider-group">
                            <input type="range" id="swb_snr" min="0" max="20" step="0.5" value="10.0">
                            <span id="swb_snr_val">10.0</span>
                        </div>
                        <p style="font-size:12px;color:#666;">较低的值意味着背景音乐更响</p>
                    </div>
                    <button id="swb_generate" onclick="generateSpeechWithBGM()" class="generate-btn">生成带背景音乐的语音</button>
                    <div id="swb_result"></div>
                </div>
            </div>
        </div>

        <!-- BGM Generation -->
        <div id="bgm" class="tab-content">
            <div class="row compact">
                <div class="col">
                    <div class="form-group">
                        <label>音乐风格：</label>
                        <select id="bgm_genre">
                            <option value="独立民谣：吉他驱动">独立民谣：吉他驱动</option>
                            <option value="当代古典音乐：钢琴驱动">当代古典音乐：钢琴驱动</option>
                            <option value="现代流行抒情曲：钢琴驱动的">现代流行抒情曲：钢琴驱动</option>
                            <option value="乡村音乐">乡村音乐</option>
                            <option value="流行乐">流行乐</option>
                            <option value="流行摇滚">流行摇滚</option>
                            <option value="电子舞曲">电子舞曲</option>
                            <option value="雷鬼顿">雷鬼顿</option>
                            <option value="迪斯科">迪斯科</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>情绪：</label>
                        <select id="bgm_mood">
                            <option value="鼓舞人心/充满希望">鼓舞人心/充满希望</option>
                            <option value="壮丽宏大">壮丽宏大</option>
                            <option value="快乐">快乐</option>
                            <option value="平静放松">平静放松</option>
                            <option value="自信/坚定">自信/坚定</option>
                            <option value="轻快无忧无虑">轻快无忧无虑</option>
                            <option value="活力四射/精力充沛">活力四射/精力充沛</option>
                            <option value="悲伤哀愁">悲伤哀愁</option>
                            <option value="温暖/友善">温暖/友善</option>
                            <option value="兴奋">兴奋</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>乐器：</label>
                        <select id="bgm_instrument">
                            <option value="低音鼓">低音鼓</option>
                            <option value="电吉他">电吉他</option>
                            <option value="合成拨弦">合成拨弦</option>
                            <option value="合成铜管乐器">合成铜管乐器</option>
                            <option value="架子鼓">架子鼓</option>
                            <option value="定音鼓">定音鼓</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>主题：</label>
                        <select id="bgm_theme">
                            <option value="励志">励志</option>
                            <option value="生日">生日</option>
                            <option value="分手">分手</option>
                            <option value="旅行">旅行</option>
                            <option value="运动">运动</option>
                            <option value="剧院音乐厅">剧院音乐厅</option>
                            <option value="音乐现场">音乐现场</option>
                            <option value="节日">节日</option>
                            <option value="好时光">好时光</option>
                            <option value="庆典与喜悦">庆典与喜悦</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>解码步数：</label>
                        <div class="slider-group">
                            <input type="range" id="bgm_max_decode_steps" min="200" max="600" step="50" value="400">
                            <span id="bgm_max_decode_steps_val">400</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>时长 (秒)：</label>
                        <div class="slider-group">
                            <input type="range" id="bgm_duration" min="30" max="60" step="1" value="35">
                            <span id="bgm_duration_val">35</span>
                        </div>
                    </div>
                    <button onclick="generateBGM()" class="generate-btn">生成背景音乐</button>
                </div>
                <div class="col">
                    <div id="bgm_result"></div>
                </div>
            </div>
        </div>

        <!-- Sound Effects (TTA) -->
        <div id="tta" class="tab-content">
            <div class="row compact">
                <div class="col">
                    <div class="form-group">
                        <label>声音事件描述：</label>
                        <textarea id="tta_text" rows="4" placeholder="例如: Thunder and a gentle rain"></textarea>
                    </div>
                    <div class="params-grid">
                        <div class="form-group">
                            <label>解码步数：</label>
                            <div class="slider-group">
                                <input type="range" id="tta_max_decode_steps" min="100" max="500" step="50" value="200">
                                <span id="tta_max_decode_steps_val">200</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CFG：</label>
                            <div class="slider-group">
                                <input type="range" id="tta_cfg" min="1.0" max="8.0" step="0.5" value="4.5">
                                <span id="tta_cfg_val">4.5</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Sigma：</label>
                            <div class="slider-group">
                                <input type="range" id="tta_sigma" min="0.1" max="1.0" step="0.05" value="0.3">
                                <span id="tta_sigma_val">0.3</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Temperature：</label>
                            <div class="slider-group">
                                <input type="range" id="tta_temperature" min="0.0" max="3.0" step="0.1" value="2.5">
                                <span id="tta_temperature_val">2.5</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="generateTTA()" class="generate-btn">生成声音</button>
                </div>
                <div class="col">
                    <div id="tta_result"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var ipData = {};
        var configList = [];

        async function loadIPData() {
            try {
                var resp = await fetch('/ip_data');
                ipData = await resp.json();
                initIPSelect();
                initZSIPSelect();
            } catch (e) {
                console.error('Failed to load IP data:', e);
            }
        }

        async function loadConfigList() {
            try {
                var resp = await fetch('/configs');
                configList = await resp.json();
                updateConfigDropdowns();
            } catch (e) {
                console.error('Failed to load config list:', e);
            }
        }

        function updateConfigDropdowns() {
            var instructSelect = document.getElementById('instruct_config_select');
            var zsSelect = document.getElementById('zs_config_select');
            
            var instructConfigs = configList.filter(function(c) {
                return c.task_type === 'Instruct TTS';
            });
            
            var zeroShotConfigs = configList.filter(function(c) {
                return c.task_type === 'Zero-shot TTS';
            });
            
            window.instructConfigs = instructConfigs;
            window.zeroShotConfigs = zeroShotConfigs;
        }

        function showConfigDropdown(inputId, dropdownId, hiddenId, configs) {
            var dropdown = document.getElementById(dropdownId);
            var input = document.getElementById(inputId);
            dropdown.innerHTML = '';
            dropdown.style.display = 'block';
            
            var filter = input.value || '';
            var filterLower = filter.toLowerCase().trim();
            var filterNoSpace = filterLower.replace(/\s+/g, '');
            
            var matched = configs.filter(function(c) {
                var nameLower = c.name.toLowerCase();
                var pinyinLower = (c.pinyin || '').toLowerCase();
                var initialsLower = (c.initials || '').toLowerCase();
                
                return nameLower.includes(filterLower) ||
                       pinyinLower.includes(filterLower) ||
                       initialsLower.includes(filterNoSpace);
            });
            
            if (matched.length === 0) {
                var noResult = document.createElement('div');
                noResult.className = 'no-result';
                noResult.textContent = '无匹配结果';
                dropdown.appendChild(noResult);
                return;
            }
            
            matched.forEach(function(c) {
                var div = document.createElement('div');
                div.textContent = c.name + ' (' + (c.pinyin || '') + ')';
                div.onclick = function(e) {
                    e.stopPropagation();
                    input.value = c.name;
                    dropdown.style.display = 'none';
                    document.getElementById(hiddenId).value = c.name;
                };
                dropdown.appendChild(div);
            });
        }

        function hideConfigDropdown() {
            document.getElementById('instruct_config_dropdown').style.display = 'none';
            document.getElementById('zs_config_dropdown').style.display = 'none';
        }

        document.getElementById('instruct_config_search').addEventListener('input', function() {
            showConfigDropdown('instruct_config_search', 'instruct_config_dropdown', 'instruct_config_select', window.instructConfigs || []);
        });

        document.getElementById('instruct_config_search').addEventListener('focus', function() {
            showConfigDropdown('instruct_config_search', 'instruct_config_dropdown', 'instruct_config_select', window.instructConfigs || []);
        });

        document.getElementById('zs_config_search').addEventListener('input', function() {

        function showIPDropdown(inputId, dropdownId, hiddenId) {
            var dropdown = document.getElementById(dropdownId);
            var input = document.getElementById(inputId);
            dropdown.innerHTML = '';
            dropdown.style.display = 'block';
            
            var filter = input.value || '';
            var filterLower = filter.toLowerCase().trim();
            var filterNoSpace = filterLower.replace(/\s+/g, '');
            
            var matched = ipList.filter(function(ip) {
                var data = ipData[ip] || {};
                var nameLower = ip.toLowerCase();
                var pinyinLower = (data.pinyin || '').toLowerCase();
                var initialsLower = (data.initials || '').toLowerCase();
                
                return nameLower.includes(filterLower) ||
                       pinyinLower.includes(filterLower) ||
                       initialsLower.includes(filterNoSpace);
            });
            
            if (matched.length === 0) {
                var noResult = document.createElement('div');
                noResult.className = 'no-result';
                noResult.textContent = '无匹配结果';
                dropdown.appendChild(noResult);
                return;
            }
            
            matched.forEach(function(ip) {
                var div = document.createElement('div');
                div.textContent = ip;
                div.onclick = function(e) {
                    e.stopPropagation();
                    input.value = ip;
                    dropdown.style.display = 'none';
                    document.getElementById(hiddenId).value = ip;
                };
                dropdown.appendChild(div);
            });
        }

        function initDropZone(dropZoneId, fileInputId, displayId) {
            var dropZone = document.getElementById(dropZoneId);
            var fileInput = document.getElementById(fileInputId);
            
            if (!dropZone || !fileInput) return;
            
            dropZone.addEventListener('click', function() {
                fileInput.click();
            });
            
            dropZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            
            dropZone.addEventListener('dragleave', function() {
                dropZone.classList.remove('dragover');
            });
            
            dropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                var files = e.dataTransfer.files;
                if (files.length > 0) {
                    fileInput.files = files;
                    var event = new Event('change', { bubbles: true });
                    fileInput.dispatchEvent(event);
                }
            });
            
            fileInput.addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    var file = this.files[0];
                    var audioDisplay = document.getElementById(displayId);
                    var url = URL.createObjectURL(file);
                    audioDisplay.innerHTML = '<audio controls src="' + url + '"></audio><p style="font-size:12px;color:#666;">' + file.name + '</p>';
                }
            });
        }

            var resultDiv = document.getElementById('swb_result');
            resultDiv.className = 'result';
            resultDiv.innerHTML = '<p>生成中... <span id="swb_elapsed">0.0</span> 秒</p>';
            
            timer = setInterval(function() {
                var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                var elapsedSpan = document.getElementById('swb_elapsed');
                if (elapsedSpan) elapsedSpan.textContent = elapsed;
            }, 100);

            var text = document.getElementById('swb_text').value;
            if (!text) {
                clearInterval(timer);
                showResult('swb', false, '请输入语音文本');
                btn.disabled = false;
                return;
            }

            var promptAudio = await uploadAudioIfNeeded('swb_prompt_audio');
            if (!promptAudio) {
                clearInterval(timer);
                showResult('swb', false, '请上传说话人参考音频');
                btn.disabled = false;
                return;
            }

            var genre = document.getElementById('swb_genre').value;
            var mood = document.getElementById('swb_mood').value;
            var instrument = document.getElementById('swb_instrument').value;
            var theme = document.getElementById('swb_theme').value;
            var snr = parseFloat(document.getElementById('swb_snr').value);

            var data = {
                task_type: 'Speech with BGM',
                text: text,
                prompt_audio: promptAudio,
                genre: genre,
                mood: mood,
                instrument: instrument,
                theme: theme,
                snr: snr,
                seed: parseInt(document.getElementById('settings_seed').value) || null,
            };

            try {
                var resp = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                var result = await resp.json();
                clearInterval(timer);
                var totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
                if (result.success) {
                    showResult('swb', true, result.message + ' (用时: ' + totalTime + '秒)', result.audio_url);
                } else {
                    showResult('swb', false, result.message);
                }
            } catch (e) {
                clearInterval(timer);
                showResult('swb', false, '错误: ' + e.message);
            }

            btn.disabled = false;
        }

        loadIPData();

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeSettings()">&times;</span>
            <h2>设置</h2>
            <div class="form-group">
                <label>随机种子 (Seed)：</label>
                <input type="number" id="settings_seed" placeholder="留空使用随机值" style="width: 100%; padding: 8px; margin: 10px 0;">
                <p style="font-size: 12px; color: #666;">设置固定种子可复现生成结果，留空则每次使用随机种子</p>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="saveSeed()" class="generate-btn">保存</button>
                <button onclick="randomizeSeed()" class="secondary" style="padding: 10px 20px; cursor: pointer;">随机生成</button>
            </div>
            <p id="settings_msg" style="margin-top: 10px; color: #666;"></p>
        </div>
    </div>

    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #666;
            border-radius: 4px;
        }
        .settings-btn:hover {
            background: #f0f0f0;
            color: #333;
        }
        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .close:hover {
            color: #333;
        }
    </style>

    <script>
        function openSettings() {
            document.getElementById('settingsModal').style.display = 'block';
            loadSeed();
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        async function loadSeed() {
            try {
                var resp = await fetch('/seed');
                var result = await resp.json();
                if (result.success) {
                    document.getElementById('settings_seed').value = result.seed;
                }
            } catch (e) {
                console.error('Failed to load seed:', e);
            }
        }

        async function saveSeed() {
            var seedInput = document.getElementById('settings_seed').value;
            var seedValue = seedInput ? parseInt(seedInput) : null;
            
            try {
                var resp = await fetch('/seed', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ seed: seedValue })
                });
                var result = await resp.json();
                if (result.success) {
                    document.getElementById('settings_msg').textContent = 'Seed已保存: ' + result.seed;
                    document.getElementById('settings_seed').value = result.seed;
                } else {
                    document.getElementById('settings_msg').textContent = 'Error: ' + result.message;
                }
            } catch (e) {
                document.getElementById('settings_msg').textContent = 'Error: ' + e.message;
            }
        }

        async function randomizeSeed() {
            document.getElementById('settings_seed').value = '';
            await saveSeed();
        }

        window.onclick = function(event) {
            var modal = document.getElementById('settingsModal');
            if (event.target == modal) {
                closeSettings();
            }
        }
    </script>
</body>
