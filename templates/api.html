<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ming-Omni-TTS API</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='api.css') }}">
    <script src="{{ url_for('static', filename='utils.js') }}"></script>
    <script src="{{ url_for('static', filename='components.js') }}"></script>
</head>
<body>
    <div class="container">
        <h1>Ming-Omni-TTS API</h1>
        
        <div class="form-group">
            <label>文本：</label>
            <textarea id="text" rows="4" placeholder="请输入要合成语音的文本..."></textarea>
        </div>
        
        <div class="form-group">
            <label>音色：</label>
            <search-select 
                id="speaker_select"
                placeholder="搜索音色..."
                hidden-id="speaker"
                data='{{ config_list | tojson }}'
                filter-fields="name,pinyin,initials"
                value-key="value">
            </search-select>
            <input type="hidden" id="speaker" value="{{ default_speaker }}">
        </div>
        
        <button id="generate" onclick="generate()">生成语音</button>
        
        <div id="result"></div>
        
        <hr>
        
        <h3 class="section-title">生成 HTTP TTS 配置</h3>
        
        <div class="form-row-inline">
            <div class="form-group">
                <label>服务器 IP：</label>
                <input type="text" id="config_ip" placeholder="如: 10.10.10.10" value="{{ server_ip }}">
            </div>
            
            <div class="form-group">
                <label>端口：</label>
                <input type="number" id="config_port" placeholder="7860" value="7860">
            </div>
        </div>
        
        <button id="generate_config" onclick="generateConfig()">生成配置</button>
        <button id="download_config" onclick="downloadConfig()" disabled>下载 JSON</button>
        <button id="copy_url" onclick="copyDownloadUrl()" disabled>复制下载 URL</button>
        
        <div id="config_preview"></div>
        
        <div class="example">
            <strong>API 调用示例：</strong><br><br>
            <code>GET /?text=你好世界&amp;speaker=小缘</code>
        </div>
    </div>

    <script>
        function generate() {
            var btn = document.getElementById('generate');
            btn.disabled = true;
            btn.textContent = '生成中...';
            
            var text = document.getElementById('text').value;
            var speaker = document.getElementById('speaker').value;
            
            if (!text) {
                showResultCommon('result', false, '请输入文本');
                btn.disabled = false;
                btn.textContent = '生成语音';
                return;
            }
            
            var url = '/?text=' + encodeURIComponent(text) + '&speaker=' + encodeURIComponent(speaker);
            
            fetch(url).then(function(resp) {
                var contentType = resp.headers.get('content-type');
                
                if (contentType && contentType.indexOf('audio') !== -1) {
                    return resp.blob().then(function(blob) {
                        var url = URL.createObjectURL(blob);
                        showResultCommon('result', true, '生成成功', url);
                    });
                } else {
                    return resp.text().then(function(text) {
                        showResultCommon('result', false, text);
                    });
                }
            }).catch(function(e) {
                showResultCommon('result', false, '错误: ' + e.message);
            }).then(function() {
                btn.disabled = false;
                btn.textContent = '生成语音';
            });
        }
        
        function generateConfig() {
            var btn = document.getElementById('generate_config');
            var ip = document.getElementById('config_ip').value || '10.10.10.10';
            var port = document.getElementById('config_port').value || 7860;
            
            btn.disabled = true;
            btn.textContent = '生成中...';
            
            fetch('/api/generate-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ip: ip, port: parseInt(port)})
            }).then(function(resp) {
                return resp.json();
            }).then(function(data) {
                var preview = document.getElementById('config_preview');
                if (data.success) {
                    preview.className = 'result success';
                    preview.style.display = 'block';
                    var previewText = JSON.stringify(data.preview, null, 2);
                    preview.innerHTML = '<p>已生成 ' + data.count + ' 个配置项</p><pre>' + previewText + '</pre>';
                    document.getElementById('download_config').disabled = false;
                    document.getElementById('copy_url').disabled = false;
                } else {
                    preview.className = 'result error';
                    preview.style.display = 'block';
                    preview.innerHTML = '<p>生成失败: ' + data.error + '</p>';
                }
            }).catch(function(e) {
                var preview = document.getElementById('config_preview');
                preview.className = 'result error';
                preview.style.display = 'block';
                preview.innerHTML = '<p>错误: ' + e.message + '</p>';
            }).then(function() {
                btn.disabled = false;
                btn.textContent = '生成配置';
            });
        }
        
        function downloadConfig() {
            window.location.href = '/api/download-config';
        }
        
        function copyDownloadUrl() {
            var url = window.location.origin + '/api/download-config';
            navigator.clipboard.writeText(url).then(function() {
                var btn = document.getElementById('copy_url');
                var originalText = btn.textContent;
                btn.textContent = '已复制!';
                setTimeout(function() {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
